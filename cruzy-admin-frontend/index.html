<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B5E20">
<title>Cruzy Admin — ตารางงาน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#1B5E20;--primary-light:#4CAF50;--primary-bg:#E8F5E9;--accent:#FF9800;--danger:#F44336;--info:#2196F3;--bg:#F5F5F5;--card:#FFF;--text:#333;--text-light:#888;--border:#E0E0E0;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Thai',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}

/* NAV */
.nav{background:var(--primary);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav-left{display:flex;align-items:center;gap:8px}
.nav h1{font-size:16px;font-weight:600}
.nav-badge{display:flex;align-items:center;gap:4px;font-size:10px;background:rgba(255,255,255,.15);padding:3px 8px;border-radius:12px}
.dot-live{width:6px;height:6px;border-radius:50%;background:#69F0AE;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.nav-right{display:flex;gap:6px}
.nav-btn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit}

/* TABS */
.tab-bar{background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:12px 18px;font-size:13px;font-weight:500;border:none;background:transparent;cursor:pointer;white-space:nowrap;font-family:inherit;border-bottom:3px solid transparent;color:var(--text-light);transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.tab:hover{color:var(--primary);background:var(--primary-bg)}

/* ALERTS */
.alert-bar{background:#FFF3E0;border-bottom:1px solid #FFE0B2;padding:8px 16px;display:none;overflow-x:auto}
.alert-bar.show{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
.alert-title{font-size:12px;font-weight:700;color:#E65100;white-space:nowrap}
.alert-chip{background:#FFEBEE;border:1px solid var(--danger);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--danger);cursor:pointer;white-space:nowrap;flex-shrink:0}

/* REALTIME BANNER */
.rt-banner{background:#E3F2FD;border-bottom:1px solid #BBDEFB;padding:6px 16px;font-size:12px;color:#1565C0;display:none;align-items:center;gap:6px}
.rt-banner.show{display:flex}

/* BRANCH TOGGLES */
.branch-toggles{display:flex;gap:4px;flex-wrap:wrap}
.b-toggle{padding:6px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;background:#fff;transition:.2s}
.b-toggle.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.b-toggle:hover{border-color:var(--primary)}

/* CONTENT */
.content{padding:12px 16px;max-width:1400px;margin:0 auto}
.controls{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.ctrl-group{display:flex;align-items:center;gap:6px}
.nav-arrow{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.nav-arrow:hover{border-color:var(--primary);background:var(--primary-bg)}
.period-label{font-size:15px;font-weight:700;color:var(--primary);min-width:140px;text-align:center}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#2E7D32}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-today{font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;color:var(--primary);font-weight:600}
.spacer{flex:1}

/* WEEKLY GRID */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day-col{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);min-height:180px;overflow:hidden;transition:.2s}
.day-col.is-today{border-top:3px solid var(--primary)}
.day-col.is-empty{border-top:3px solid var(--accent)}
.day-col.drop-over{box-shadow:0 0 0 2px var(--primary-light);background:#F1F8E9}
.dh{padding:8px;text-align:center;border-bottom:1px solid var(--border)}
.day-col.is-today .dh{background:var(--primary-bg)}
.dh .dn{font-size:11px;color:var(--text-light)}
.dh .dd{font-size:18px;font-weight:700}
.day-col.is-today .dh .dd{color:var(--primary)}
.dh .dc{font-size:10px}.dh .dc.empty{color:var(--danger);font-weight:600}
.db{padding:4px;display:flex;flex-direction:column;gap:3px}
.s-card{background:var(--primary-bg);border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:6px;position:relative;animation:cardIn .25s;font-size:12px;cursor:grab}
.s-card .av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;flex-shrink:0}
.s-card .nm{font-weight:500;flex:1}
.s-card .br-tag{font-size:9px;color:var(--text-light);background:#fff;padding:1px 5px;border-radius:4px}
.s-card .del{position:absolute;right:2px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--danger);font-size:13px;cursor:pointer;opacity:0;transition:.15s;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.s-card:hover .del{opacity:1}
.add-slot{border:2px dashed var(--border);border-radius:6px;padding:10px;text-align:center;color:var(--text-light);font-size:11px;cursor:pointer;transition:.2s;margin-top:auto}
.add-slot:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-bg)}
@keyframes cardIn{from{opacity:0;transform:translateY(-4px)}}

/* DAILY VIEW */
.daily-branches{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.daily-branch{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px;box-shadow:var(--shadow)}
.daily-branch.has-alert{border-color:var(--danger);background:#FFF8F6}
.daily-branch h4{font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between}
.daily-branch h4 .cnt{font-size:11px;color:var(--text-light);background:#F0F0F0;padding:2px 8px;border-radius:8px}
.daily-branch .emp-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
.daily-branch .emp-row .dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700}
.daily-branch .no-one{color:var(--danger);font-size:13px;font-weight:600;padding:8px 0}

/* MONTHLY VIEW */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.month-head{text-align:center;font-size:11px;color:var(--text-light);padding:6px;font-weight:600}
.month-cell{background:var(--card);border-radius:6px;min-height:60px;padding:4px;font-size:11px;cursor:pointer;border:1px solid transparent;position:relative}
.month-cell:hover{border-color:var(--primary-light)}
.month-cell.today{border:2px solid var(--primary)}
.month-cell.other-month{opacity:.35}
.month-cell .mdd{font-weight:700;margin-bottom:2px}
.month-cell .mdots{display:flex;flex-wrap:wrap;gap:2px}
.month-cell .mdot{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:7px;font-weight:700}
.month-cell.alert-cell{background:#FFF3E0}
.month-cell.alert-cell .mdd{color:var(--danger)}

/* PERSON VIEW */
.person-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.person-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.pc-head{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.pc-head .av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700}
.pc-head .info{flex:1}.pc-head .info h4{font-size:15px}.pc-head .info .sub{font-size:12px;color:var(--text-light)}
.pc-body{padding:12px 16px}
.pc-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #F5F5F5;font-size:13px}
.pc-row:last-child{border:none}.pc-date{width:90px;font-weight:600;color:var(--primary);font-size:12px}.pc-branch{flex:1}
.pc-summary{padding:12px 16px;background:#F9F9F9;border-top:1px solid var(--border);font-size:12px;color:var(--text-light)}

/* BRANCH VIEW */
.branch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;align-items:start}
.branch-detail{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;min-width:0}
.bd-head{padding:10px 14px;background:var(--primary);color:#fff;text-align:center}
.bd-head h3{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bd-body{padding:6px 10px}
.bd-day{border-bottom:1px solid #F0F0F0;padding:6px 0;display:flex;flex-direction:column;gap:4px}
.bd-day:last-child{border:none}
.bd-day-label{font-size:11px;font-weight:700;color:var(--primary)}
.bd-day-staff{display:flex;flex-wrap:wrap;gap:4px;min-height:28px}
.bd-day-staff .chip{display:flex;align-items:center;gap:4px;background:var(--primary-bg);padding:3px 7px;border-radius:6px;font-size:11px;cursor:grab}
.bd-day-staff .chip.dragging{opacity:.4}
.bd-day-staff .chip .dot{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:7px;font-weight:700}
.bd-day-staff .no{color:var(--danger);font-size:11px;font-weight:600}
.bd-day-staff.drop-zone{border:2px dashed transparent;border-radius:6px;transition:.2s}
.bd-day-staff.drop-zone.drag-over{border-color:var(--primary);background:#F1F8E9}
@media(min-width:1200px){.branch-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:900px) and (max-width:1199px){.branch-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:599px){.branch-grid{grid-template-columns:repeat(2,1fr)}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:200}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:380px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .25s}
@keyframes mIn{from{transform:translateY(12px);opacity:0}}
.m-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.m-head h2{font-size:16px}
.m-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light)}
.m-body{padding:16px 18px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--text-light);margin-bottom:4px;font-weight:500}
.fg select,.fg input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.fg select:focus,.fg input:focus{border-color:var(--primary)}
.fg select option.taken{color:#aaa}
.fg .conflict{color:var(--danger);font-size:11px;margin-top:4px;display:none}
.fg .conflict.show{display:block}
.m-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* TOASTS */
.toasts{position:fixed;top:58px;right:12px;z-index:300;display:flex;flex-direction:column;gap:6px}
.t{padding:10px 16px;border-radius:10px;font-size:13px;color:#fff;animation:cardIn .25s;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:300px}
.t-ok{background:var(--primary)}.t-err{background:var(--danger)}.t-rt{background:var(--info)}.t-warn{background:var(--accent)}

/* SIDEBAR */
.emp-sidebar{position:fixed;right:0;top:52px;width:160px;height:calc(100vh - 52px);background:var(--card);border-left:1px solid var(--border);z-index:50;padding:8px;overflow-y:auto}
.emp-sidebar .sidebar-title{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px}
.emp-chip{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:6px;margin-bottom:2px;cursor:grab;font-size:12px}
.emp-chip:hover{background:#F5F5F5}
.emp-chip.dragging{opacity:.4}
.emp-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;flex-shrink:0}
.content-with-sidebar{margin-right:160px}

/* MOBILE */
@media(max-width:768px){
  .emp-sidebar{display:none}.content-with-sidebar{margin-right:0}
  .week-grid{grid-template-columns:repeat(2,1fr)}
  .month-grid{gap:2px}.month-cell{min-height:42px;padding:2px}.month-cell .mdot{width:10px;height:10px;font-size:0}
  .period-label{min-width:90px;font-size:13px}.daily-branches{grid-template-columns:1fr}
  .person-cards{grid-template-columns:1fr}.nav h1{font-size:14px}
}
@media(max-width:480px){.week-grid{grid-template-columns:1fr}.controls{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-left"><h1>📋 Cruzy Admin</h1><div class="nav-badge"><div class="dot-live"></div> Realtime</div></div>
  <div class="nav-right"><button class="nav-btn" onclick="shareLink()">🔗 แชร์</button><button class="nav-btn" onclick="toggleFullscreen()">⛶</button></div>
</nav>

<div class="tab-bar" id="tabBar">
  <button class="tab" data-view="daily" onclick="switchView('daily')">📌 รายวัน</button>
  <button class="tab active" data-view="weekly" onclick="switchView('weekly')">📅 รายสัปดาห์</button>
  <button class="tab" data-view="monthly" onclick="switchView('monthly')">🗓️ รายเดือน</button>
  <button class="tab" data-view="branch" onclick="switchView('branch')">🏢 ตามสาขา</button>
  <button class="tab" data-view="person" onclick="switchView('person')">👤 รายคน</button>
</div>

<div class="alert-bar" id="alertBar">
  <div class="alert-title">⚠️ สาขาไม่มีคนเข้า</div>
  <div class="alert-chips" id="alertChips" style="display:flex;gap:6px"></div>
</div>

<div class="rt-banner" id="rtBanner"><span style="animation:blink 1s infinite">📡</span><span id="rtText"></span></div>

<div class="emp-sidebar" id="empSidebar">
  <div class="sidebar-title">👥 ลากวางพนักงาน</div>
  <div id="empList"></div>
</div>

<div class="content content-with-sidebar" id="mainContent">
  <div class="controls" id="controls"></div>
  <div id="viewContainer"></div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="m-head"><h2>เพิ่มตารางงาน</h2><button class="m-close" onclick="closeModal()">&times;</button></div>
    <div class="m-body">
      <div class="fg"><label>📅 วันที่</label><input type="date" id="mDate" onchange="populateEmpSelect()"/></div>
      <div class="fg">
        <label>👤 พนักงาน</label>
        <select id="mEmp" onchange="checkConflict()"><option value="">เลือก...</option></select>
        <div class="conflict" id="conflictMsg"></div>
      </div>
      <div class="fg"><label>🏢 สาขา</label><select id="mBranch"><option value="">เลือก...</option></select></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" id="saveBtn" onclick="save()">💾 บันทึก</button>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
// === SETTING API URL ===
const API_URL = 'https://cruzy-web-production.up.railway.app/api';
const BRANCHES=[
  {id:'b1',name:'Central Chiangmai Airport',code:'CCA'},
  {id:'b2',name:'Central Chiangmai (Festival)',code:'CCF'},
  {id:'b3',name:'Maya',code:'MYA'},
  {id:'b4',name:'One Nimman',code:'ONM'},
];
const EMPS=[
  {id:'e1',name:'เป้',code:'E001',c:'#4CAF50'},
  {id:'e2',name:'แพน',code:'E002',c:'#FF9800'},
  {id:'e3',name:'มด',code:'E003',c:'#2196F3'},
  {id:'e4',name:'ณัชชา',code:'E004',c:'#9C27B0'},
  {id:'e5',name:'ขวัญ',code:'E005',c:'#E91E63'},
  {id:'e6',name:'ลี',code:'E006',c:'#00BCD4'},
];

let DB={};
let curView='weekly';
let weekStart=monday(new Date());
let curMonth=new Date(); curMonth.setDate(1);
let curDay=new Date();
let selectedBranches=['b1','b2','b3','b4']; 
let dragEid=null;
let dragFromBid=null; 
let dragFromDate=null;

// === FETCH DATA FROM BACKEND ===
async function fetchSchedules() {
  try {
    const res = await fetch(`${API_URL}/schedule`);
    if (!res.ok) throw new Error('Network response was not ok');
    DB = await res.json();
    renderView();
  } catch (error) {
    console.error('Error fetching data:', error);
    toast('❌ ดึงข้อมูลจากเซิร์ฟเวอร์ล้มเหลว', 't-err');
  }
}

// === API CALL FOR ASSIGNING SCHEDULE ===
async function assignSchedule(bid, date, eid) {
  const existing = getEmpBranchOnDate(eid, date);
  if (existing) {
    const emp = EMPS.find(e => e.id === eid);
    if (existing.id === bid) {
      toast(`${emp.name} อยู่สาขานี้แล้ว`, 't-err');
      return false;
    }
    toast(`❌ ${emp.name} ลงที่ ${existing.name} แล้ว (1คน=1สาขา/วัน)`, 't-err');
    return false;
  }

  try {
    const res = await fetch(`${API_URL}/schedule/assign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bid, date, eid })
    });
    const result = await res.json();
    if (!res.ok) {
      toast(`❌ ${result.message}`, 't-err');
      return false;
    }
    
    const k = `${bid}_${date}`;
    if (!DB[k]) DB[k] = [];
    DB[k].push(eid);
    return true;
  } catch (error) {
    console.error(error);
    toast('❌ ไม่สามารถบันทึกข้อมูลได้', 't-err');
    return false;
  }
}

// === API CALL FOR REMOVING SCHEDULE ===
async function removeSchedule(bid, date, eid) {
  try {
    const res = await fetch(`${API_URL}/schedule/remove`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bid, date, eid })
    });
    if (!res.ok) {
      toast('❌ ลบข้อมูลจากเซิร์ฟเวอร์ล้มเหลว', 't-err');
      return false;
    }
    
    const k = `${bid}_${date}`;
    if (DB[k]) {
      DB[k] = DB[k].filter(e => e !== eid);
      if (DB[k].length === 0) delete DB[k];
    }
    return true;
  } catch (error) {
    console.error(error);
    toast('❌ เกิดข้อผิดพลาดในการเชื่อมต่อเพื่อลบ', 't-err');
    return false;
  }
}

// === LOCAL CONSTRAINT HELPER ===
function getEmpBranchOnDate(eid,date){
  for(const b of BRANCHES){const k=`${b.id}_${date}`;if(DB[k]&&DB[k].includes(eid))return b}return null;
}

// === TRANSFER (cross-branch) ===
async function transferEmployee(fromBid,toBid,date,eid){
  const removeSuccess = await removeSchedule(fromBid,date,eid);
  if(!removeSuccess) return;
  
  const assignSuccess = await assignSchedule(toBid,date,eid);
  if(!assignSuccess) {
    await fetchSchedules();
    return;
  }
  
  const emp=EMPS.find(e=>e.id===eid);
  const from=BRANCHES.find(b=>b.id===fromBid);
  const to=BRANCHES.find(b=>b.id===toBid);
  toast(`🔄 โอน ${emp.name}: ${from.code} → ${to.code}`,'t-ok');
  broadcastRealtime('transfer',emp.name,date);
  renderView();
}

// === ALERTS ===
function findAlerts(start,days){
  const a=[];for(let i=0;i<days;i++){const dt=new Date(start);dt.setDate(dt.getDate()+i);const ds=fmt(dt);
  for(const b of BRANCHES){const k=`${b.id}_${ds}`;if(!DB[k]||DB[k].length===0)a.push({branch:b,date:ds,dateObj:dt})}}return a;
}
function renderAlerts(){
  let alerts;
  if(curView==='monthly'){const dim=new Date(curMonth.getFullYear(),curMonth.getMonth()+1,0).getDate();alerts=findAlerts(curMonth,dim)}
  else if(curView==='daily')alerts=findAlerts(curDay,1);
  else alerts=findAlerts(weekStart,7);
  const bar=document.getElementById('alertBar'),chips=document.getElementById('alertChips');
  if(!alerts.length){bar.classList.remove('show');return}
  bar.classList.add('show');
  chips.innerHTML=alerts.slice(0,15).map(a=>{
    const dl=new Date(a.date).toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'});
    return `<div class="alert-chip" onclick="jumpToDate('${a.date}')">${a.branch.code} — ${dl} ❌</div>`;
  }).join('')+(alerts.length>15?`<div class="alert-chip">+${alerts.length-15}</div>`:'');
}

// === INIT ===
document.addEventListener('DOMContentLoaded',()=>{
  renderEmps();
  switchView('weekly');
  fetchSchedules();
});

// === VIEW SWITCHING ===
function switchView(v){
  curView=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  const sb=document.getElementById('empSidebar'),mc=document.getElementById('mainContent');
  sb.style.display=(v==='weekly'||v==='branch')?'':'none';
  mc.classList.toggle('content-with-sidebar',v==='weekly'||v==='branch');
  renderControls();renderView();renderAlerts();
}

function branchTogglesHTML(id){
  return `<div class="branch-toggles" id="${id}">${BRANCHES.map(b=>
    `<button class="b-toggle ${selectedBranches.includes(b.id)?'on':''}" data-bid="${b.id}" onclick="toggleBranch('${b.id}',this)">${b.code}</button>`
  ).join('')}</div>`;
}
function toggleBranch(bid,el){
  if(selectedBranches.includes(bid)){
    if(selectedBranches.length===1)return; 
    selectedBranches=selectedBranches.filter(x=>x!==bid);el.classList.remove('on');
  }else{selectedBranches.push(bid);el.classList.add('on')}
  renderView();
}

function renderControls(){
  const c=document.getElementById('controls');
  if(!c) return;
  if(curView==='weekly'){
    c.innerHTML=`<div class="ctrl-group"><button class="nav-arrow" onclick="moveWeek(-1)">◀</button>
      <div class="period-label" id="periodLabel"></div><button class="nav-arrow" onclick="moveWeek(1)">▶</button>
      <button class="btn-today" onclick="goToday()">วันนี้</button></div><div class="spacer"></div>
      ${branchTogglesHTML('weekToggles')}
      <button class="btn btn-primary" onclick="openModal()">+ เพิ่ม</button>`;
  }else if(curView==='daily'){
    c.innerHTML=`<div class="ctrl-group"><button class="nav-arrow" onclick="moveDay(-1)">◀</button>
      <div class="period-label" id="periodLabel"></div><button class="nav-arrow" onclick="moveDay(1)">▶</button>
      <button class="btn-today" onclick="goTodayDaily()">วันนี้</button></div><div class="spacer"></div>
      <button class="btn btn-primary" onclick="openModal()">+ เพิ่ม</button>`;
  }else if(curView==='monthly'){
    c.innerHTML=`<div class="ctrl-group"><button class="nav-arrow" onclick="moveMonth(-1)">◀</button>
      <div class="period-label" id="periodLabel"></div><button class="nav-arrow" onclick="moveMonth(1)">▶</button>
      <button class="btn-today" onclick="goTodayMonth()">เดือนนี้</button></div><div class="spacer"></div>
      ${branchTogglesHTML('monthToggles')}`;
  }else if(curView==='branch'){
    c.innerHTML=`<div class="ctrl-group"><button class="nav-arrow" onclick="moveWeek(-1)">◀</button>
      <div class="period-label" id="periodLabel"></div><button class="nav-arrow" onclick="moveWeek(1)">▶</button>
      <button class="btn-today" onclick="goToday()">สัปดาห์นี้</button></div><div class="spacer"></div>
      ${branchTogglesHTML('branchToggles')}
      <button class="btn btn-primary" onclick="openModal()">+ เพิ่ม</button>`;
  }else if(curView==='person'){
    c.innerHTML=`<div class="ctrl-group"><button class="nav-arrow" onclick="moveMonth(-1)">◀</button>
      <div class="period-label" id="periodLabel"></div><button class="nav-arrow" onclick="moveMonth(1)">▶</button>
      <button class="btn-today" onclick="goTodayMonth()">เดือนนี้</button></div>`;
  }
}
function renderView(){
  const v=document.getElementById('viewContainer');
  if(!v) return;
  if(curView==='weekly')renderWeekly(v);else if(curView==='daily')renderDaily(v);
  else if(curView==='monthly')renderMonthly(v);else if(curView==='branch')renderBranchView(v);
  else if(curView==='person')renderPerson(v);renderAlerts();
}

// === WEEKLY VIEW (multi-branch) ===
function renderWeekly(container){
  const bids=selectedBranches.filter(id=>BRANCHES.find(b=>b.id===id));
  const end=new Date(weekStart);end.setDate(end.getDate()+6);
  const lbl = document.getElementById('periodLabel');
  if(lbl) lbl.textContent=`${thDate(weekStart)} — ${thDate(end)}`;
  const todayStr=fmt(new Date());
  let html='<div class="week-grid">';
  for(let i=0;i<7;i++){
    const dt=new Date(weekStart);dt.setDate(dt.getDate()+i);const ds=fmt(dt);
    const isToday=ds===todayStr;
    let allCards=[];
    let totalCount=0;
    bids.forEach(bid=>{
      const eids=DB[`${bid}_${ds}`]||[];
      const br=BRANCHES.find(b=>b.id===bid);
      totalCount+=eids.length;
      eids.forEach(eid=>{
        const e=EMPS.find(x=>x.id===eid);if(!e)return;
        allCards.push(`<div class="s-card" draggable="true" ondragstart="dragCardStart(event,'${eid}','${bid}','${ds}')" ondragend="dragEnd(event)">
          <div class="av" style="background:${e.c}">${e.name[0]}</div>
          <span class="nm">${e.name}</span>
          ${bids.length>1?`<span class="br-tag">${br.code}</span>`:''}
          <button class="del" onclick="removeAndRefresh('${bid}','${ds}','${eid}')" title="ลบ">✕</button>
        </div>`);
      });
    });
    const empty=totalCount===0;
    const dn=dt.toLocaleDateString('th-TH',{weekday:'short'});
    const dd=dt.getDate();
    html+=`<div class="day-col ${isToday?'is-today':''} ${empty?'is-empty':''}"
      ondragover="event.preventDefault();this.classList.add('drop-over')"
      ondragleave="this.classList.remove('drop-over')"
      ondrop="event.preventDefault();this.classList.remove('drop-over');dropOnWeekly('${ds}')">
      <div class="dh"><div class="dn">${dn}</div><div class="dd">${dd}</div>
      <div class="dc ${empty?'empty':''}">${empty?'⚠️ ว่าง':totalCount+' คน'}</div></div>
      <div class="db">${allCards.join('')}
      <div class="add-slot" onclick="openModal('${ds}')">+ เพิ่ม</div></div></div>`;
  }
  html+='</div>';container.innerHTML=html;
}

// === DAILY VIEW ===
function renderDaily(container){
  const ds=fmt(curDay);
  const lbl = document.getElementById('periodLabel');
  if(lbl) lbl.textContent=curDay.toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let html='<div class="daily-branches">';
  for(const b of BRANCHES){
    const eids=DB[`${b.id}_${ds}`]||[];const hasAlert=eids.length===0;
    html+=`<div class="daily-branch ${hasAlert?'has-alert':''}"><h4>${b.name} <span class="cnt">${eids.length} คน</span></h4>`;
    if(!eids.length)html+=`<div class="no-one">❌ ไม่มีคนเข้า</div>`;
    else eids.forEach(eid=>{const e=EMPS.find(x=>x.id===eid);if(!e)return;
      html+=`<div class="emp-row"><div class="dot" style="background:${e.c}">${e.name[0]}</div>${e.name}</div>`});
    html+=`</div>`;
  }
  html+='</div>';container.innerHTML=html;
}

// === MONTHLY VIEW ===
function renderMonthly(container){
  const bids=selectedBranches;
  const yr=curMonth.getFullYear(),mo=curMonth.getMonth();
  const lbl = document.getElementById('periodLabel');
  if(lbl) lbl.textContent=new Date(yr,mo).toLocaleDateString('th-TH',{month:'long',year:'numeric'});
  const first=new Date(yr,mo,1),lastDay=new Date(yr,mo+1,0).getDate();
  let startDay=first.getDay();if(startDay===0)startDay=7;startDay--;
  const todayStr=fmt(new Date());
  const days=['จ.','อ.','พ.','พฤ.','ศ.','ส.','อา.'];
  let html='<div class="month-grid">';
  days.forEach(d=>{html+=`<div class="month-head">${d}</div>`});
  for(let i=0;i<startDay;i++){const pd=new Date(yr,mo,-(startDay-1-i));html+=`<div class="month-cell other-month"><div class="mdd">${pd.getDate()}</div></div>`}
  for(let d=1;d<=lastDay;d++){
    const dt=new Date(yr,mo,d),ds=fmt(dt),isToday=ds===todayStr;
    let hasEmpty=false;const dots=[];
    for(const b of BRANCHES){if(!bids.includes(b.id))continue;const eids=DB[`${b.id}_${ds}`]||[];
      if(!eids.length)hasEmpty=true;eids.forEach(eid=>{const e=EMPS.find(x=>x.id===eid);if(e)dots.push(e)})}
    html+=`<div class="month-cell ${isToday?'today':''} ${hasEmpty?'alert-cell':''}" onclick="jumpToDate('${ds}')">
      <div class="mdd">${d}</div><div class="mdots">${dots.slice(0,6).map(e=>`<div class="mdot" style="background:${e.c}" title="${e.name}">${e.name[0]}</div>`).join('')}${dots.length>6?`<div class="mdot" style="background:#999">+${dots.length-6}</div>`:''}</div></div>`;
  }
  const total=startDay+lastDay,rem=total%7===0?0:7-total%7;
  for(let i=1;i<=rem;i++)html+=`<div class="month-cell other-month"><div class="mdd">${i}</div></div>`;
  html+='</div>';container.innerHTML=html;
}

// === BRANCH VIEW ===
function renderBranchView(container){
  const bids=selectedBranches;
  const end=new Date(weekStart);end.setDate(end.getDate()+6);
  const lbl = document.getElementById('periodLabel');
  if(lbl) lbl.textContent=`${thDate(weekStart)} — ${thDate(end)}`;
  let html='<div class="branch-grid">';
  for(const bid of bids){
    const branch=BRANCHES.find(b=>b.id===bid);
    html+=`<div class="branch-detail"><div class="bd-head"><h3>🏢 ${branch.name} (${branch.code})</h3></div><div class="bd-body">`;
    for(let i=0;i<7;i++){
      const dt=new Date(weekStart);dt.setDate(dt.getDate()+i);const ds=fmt(dt);
      const eids=DB[`${bid}_${ds}`]||[];
      const dayLabel=dt.toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'});
      html+=`<div class="bd-day"><div class="bd-day-label">${dayLabel}</div>
        <div class="bd-day-staff drop-zone" data-bid="${bid}" data-date="${ds}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="event.preventDefault();this.classList.remove('drag-over');dropOnBranch('${bid}','${ds}')">`;
      if(!eids.length)html+=`<div class="no">❌ ว่าง</div>`;
      else eids.forEach(eid=>{const e=EMPS.find(x=>x.id===eid);if(!e)return;
        html+=`<div class="chip" draggable="true" ondragstart="dragCardStart(event,'${eid}','${bid}','${ds}')" ondragend="dragEnd(event)">
          <div class="dot" style="background:${e.c}">${e.name[0]}</div>${e.name}</div>`});
      html+=`</div></div>`;
    }
    html+=`</div></div>`;
  }
  html+='</div>';container.innerHTML=html;
}

// === PERSON VIEW ===
function renderPerson(container){
  const yr=curMonth.getFullYear(),mo=curMonth.getMonth();
  const lastDay=new Date(yr,mo+1,0).getDate();
  const lbl = document.getElementById('periodLabel');
  if(lbl) lbl.textContent=new Date(yr,mo).toLocaleDateString('th-TH',{month:'long',year:'numeric'});
  let html='<div class="person-cards">';
  for(const emp of EMPS){
    const rows=[];
    for(let d=1;d<=lastDay;d++){const dt=new Date(yr,mo,d),ds=fmt(dt);
      const branch=getEmpBranchOnDate(emp.id,ds);if(branch)rows.push({date:ds,dateObj:dt,branch})}
    html+=`<div class="person-card">
      <div class="pc-head">
        <div class="av" style="background:${emp.c}">${emp.name[0]}</div>
        <div class="info"><h4>${emp.name}</h4><div class="sub">รหัส: ${emp.code}</div></div>
      </div>
      <div class="pc-body">`;
    if(!rows.length) html+=`<div style="color:var(--text-light);font-size:13px;padding:8px 0;">ไม่มีตารางงานในเดือนนี้</div>`;
    else rows.forEach(r=>{
      html+=`<div class="pc-row">
        <div class="pc-date">${r.dateObj.toLocaleDateString('th-TH',{day:'numeric',month:'short'})}</div>
        <div class="pc-branch">🏢 ${r.branch.code}</div>
      </div>`
    });
    html+=`</div><div class="pc-summary">รวมเข้างาน: ${rows.length} วัน</div></div>`;
  }
  html+='</div>';container.innerHTML=html;
}

// === SIDEBAR EMPS ===
function renderEmps(){
  const el=document.getElementById('empList');if(!el)return;
  el.innerHTML=EMPS.map(e=>`<div class="emp-chip" draggable="true" ondragstart="dragSidebarStart(event,'${e.id}')" ondragend="dragEnd(event)">
    <div class="emp-dot" style="background:${e.c}">${e.name[0]}</div><span>${e.name}</span></div>`).join('');
}

// === DRAG AND DROP LOGIC ===
function dragSidebarStart(e,eid){
  dragEid=eid;dragFromBid=null;dragFromDate=null;
  e.target.classList.add('dragging');
}
function dragCardStart(e,eid,bid,date){
  dragEid=eid;dragFromBid=bid;dragFromDate=date;
  e.target.classList.add('dragging');
}
function dragEnd(e){
  e.target.classList.remove('dragging');
}

// 💡 ปรับปรุง: เมื่อปล่อยวางในหน้า Weekly ให้เด้ง Modal เลือกสาขาก่อนบันทึก
async function dropOnWeekly(date){
  if(!dragEid) return;
  
  const targetEid = dragEid;
  const fromBid = dragFromBid;
  const fromDate = dragFromDate;
  
  // ตรวจสอบและแปลงวันที่เพื่อให้ในฟอร์มขึ้นวันตรงตามช่องที่วางเป๊ะๆ ไม่หลุด Timezone
  let exactDate = date;
  if (date instanceof Date) {
    const offset = date.getTimezoneOffset() * 60000;
    exactDate = (new Date(date.getTime() - offset)).toISOString().split('T')[0];
  } else if (typeof date === 'string') {
    exactDate = date.split('T')[0];
  }
  
  // เรียกเปิด Modal เด้งถาม
  openModal(exactDate, targetEid);
  
  // จัดการ Event บันทึกของปุ่มใน Modal
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.onclick = null; 
  
  saveBtn.onclick = async function() {
    const chosenBranch = document.getElementById('mBranch').value;
    if(!chosenBranch) {
      toast('❌ กรุณาเลือกสาขาด้วยครับ', 't-warn');
      return;
    }
    
    closeModal();
    
    // ถ้าเป็นการลากย้ายการ์ดใบเดิม ข้ามวัน ให้ลบอันเก่าก่อน
    if(fromBid && fromDate && fromDate !== exactDate) {
      const removeSuccess = await removeSchedule(fromBid, fromDate, targetEid);
      if(!removeSuccess) return;
    }
    
    await assignAndRefresh(chosenBranch, exactDate, targetEid);
  };
}

async function dropOnBranch(toBid,date){
  if(!dragEid)return;
  const eid=dragEid,fromBid=dragFromBid,fromDate=dragFromDate;
  if(fromBid && fromDate===date){
    if(fromBid===toBid)return;
    await transferEmployee(fromBid,toBid,date,eid);
  }else{
    if(fromBid && fromDate) {
      const removeSuccess = await removeSchedule(fromBid,fromDate,eid);
      if(!removeSuccess) return;
    }
    await assignAndRefresh(toBid,date,eid);
  }
}

// === MODAL FUNCTIONS ===
function openModal(dateStr='', eid=''){
  document.getElementById('overlay').classList.add('open');
  const dInput=document.getElementById('mDate');
  
  // 💡 จุดแก้ไข: ตรวจสอบและล็อกความถูกต้องของรูปแบบข้อความวันที่ก่อนใส่ลงฟอร์ม
  let finalDate = '';
  if (dateStr instanceof Date) {
    const offset = dateStr.getTimezoneOffset() * 60000;
    finalDate = (new Date(dateStr.getTime() - offset)).toISOString().split('T')[0];
  } else if (typeof dateStr === 'string' && dateStr.includes('T')) {
    finalDate = dateStr.split('T')[0];
  } else {
    finalDate = dateStr || fmt(new Date());
  }

  dInput.value = finalDate;
  
  const bSel=document.getElementById('mBranch');
  bSel.innerHTML=`<option value="">เลือกสาขา...</option>`+BRANCHES.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  
  populateEmpSelect();
  if(eid) document.getElementById('mEmp').value = eid;
  checkConflict();
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('conflictMsg').classList.remove('show');
  // คืนค่าปุ่มบันทึกให้กลับไปใช้ฟังก์ชันเซฟปกติฝั่งการกดมือแบบธรรมดา
  document.getElementById('saveBtn').onclick = save; 
}

function populateEmpSelect(){
  const date=document.getElementById('mDate').value;
  const eSel=document.getElementById('mEmp');if(!eSel)return;
  const curVal=eSel.value;
  eSel.innerHTML=`<option value="">เลือกพนักงาน...</option>`+EMPS.map(e=>{
    const b=getEmpBranchOnDate(e.id,date);
    return `<option value="${e.id}" class="${b?'taken':''}">${e.name} ${b?`(${b.code})`:''}</option>`;
  }).join('');
  eSel.value=curVal;
}

function checkConflict(){
  const date=document.getElementById('mDate').value,eid=document.getElementById('mEmp').value;
  const msg=document.getElementById('conflictMsg');if(!msg)return;
  if(!date||!eid){msg.classList.remove('show');return}
  const b=getEmpBranchOnDate(eid,date);
  if(b){msg.textContent=`⚠️ วันนี้ลงงานไว้แล้วที่สาขา ${b.code}`;msg.classList.add('show')}
  else msg.classList.remove('show');
}

async function save(){
  const date=document.getElementById('mDate').value;
  const eid=document.getElementById('mEmp').value;
  const bid=document.getElementById('mBranch').value;
  if(!date||!eid||!bid){toast('❌ กรุณากรอกข้อมูลให้ครบถ้วน','t-warn');return}
  
  closeModal();
  await assignAndRefresh(bid,date,eid);
}

// === ACTION UTILS ===
async function assignAndRefresh(bid,date,eid){
  const success = await assignSchedule(bid,date,eid);
  if(success){
    renderView();
    const e=EMPS.find(x=>x.id===eid);
    toast(`✅ เพิ่ม ${e?.name} — ${date}`,'t-ok');
    broadcastRealtime('add',e?.name,date);
  }
}

async function removeAndRefresh(bid,date,eid){
  const success = await removeSchedule(bid,date,eid);
  if(success){
    renderView();
    const e=EMPS.find(x=>x.id===eid);
    toast(`🗑️ ลบ ${e?.name}`,'t-ok');
    broadcastRealtime('remove',e?.name,date);
  }
}

// === REALTIME BANNER ===
function broadcastRealtime(action,empName,date){
  const banner=document.getElementById('rtBanner'),txt=document.getElementById('rtText');
  if(!banner || !txt) return;
  txt.textContent=`${action==='add'?'เพิ่ม':action==='remove'?'ลบ':'โอน'} ${empName} วัน ${date} — synced`;
  banner.classList.add('show');setTimeout(()=>banner.classList.remove('show'),3000);
  setTimeout(()=>toast('📡 Realtime synced','t-rt'),400);
}

// === DATE NAVIGATION UTILS ===
function monday(d){const x=new Date(d);const day=x.getDay();x.setDate(x.getDate()-day+(day===0?-6:1));x.setHours(0,0,0,0);return x}
function fmt(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function thDate(d){return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})}
function toast(msg,cls='t-ok'){
  const tDiv=document.getElementById('toasts');if(!tDiv)return;
  const el=document.createElement('div');el.className=`t ${cls}`;el.textContent=msg;
  tDiv.appendChild(el);setTimeout(()=>el.remove(),3000);
}
function moveWeek(dir){weekStart.setDate(weekStart.getDate()+dir*7);renderView()}
function goToday(){weekStart=monday(new Date());renderView()}
function moveDay(dir){curDay.setDate(curDay.getDate()+dir);renderView()}
function goTodayDaily(){curDay=new Date();renderView()}
function moveMonth(dir){curMonth.setMonth(curMonth.getMonth()+dir);renderView()}
function goTodayMonth(){curMonth=new Date();curMonth.setDate(1);renderView()}
function jumpToDate(ds){
  const target=new Date(ds);
  curDay=new Date(target);
  weekStart=monday(target);
  curMonth=new Date(target);curMonth.setDate(1);
  switchView('daily');
}
function shareLink(){navigator.clipboard.writeText(window.location.href);toast('📋 ก๊อปปี้ลิงก์เข้าคลิปบอร์ดแล้ว')}
function toggleFullscreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{})}
  else{document.exitFullscreen()}
}
